<!DOCTYPE html>
<html lang="tr" data-theme="gece">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monolith v16 - Log-Focus Edition</title>
    <style>
        :root {
            --bg-main: #0f111a; --bg-panel: #1a1d2e; --bg-input: #22263d;
            --border-light: #2d3250; --border-dark: #333333;
            --text-main: #e0e0e0; --text-muted: #888888; --text-inverse: #ffffff;
            --btn-freeze: #00BCD4; --btn-reset: #ff9800;
            --color-work: #2196F3; --color-break: #4CAF50; --color-danger: #f44336;
            --btn-secondary: #4e5481; --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="gunduz"] { --bg-main: #e4e7eb; --bg-panel: #ffffff; --bg-input: #f5f7fa; --border-light: #cbd2d9; --text-main: #1f2933; --text-muted: #616e7c; }
        [data-theme="kutuphane"] { --bg-main: #f4eccf; --bg-panel: #e9dfbc; --bg-input: #fdfaf0; --border-light: #d4c59a; --text-main: #4a3b2c; --text-muted: #6e5c47; }
        [data-theme="cin_tapinagi"] { --bg-main: #1c0e0e; --bg-panel: #2e1515; --bg-input: #3d1c1c; --border-light: #5c2727; --text-main: #f4e4c1; --color-work: #d4af37; --color-break: #2a9d8f; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-main); color: var(--text-main); margin: 0; transition: var(--transition); overflow: hidden; }

        .main-container { display: grid; grid-template-columns: 160px 1fr; gap: 2rem; background: var(--bg-panel); padding: 4rem 3rem 3rem 3rem; border-radius: 40px; box-shadow: 0 30px 70px rgba(0,0,0,0.5); border: 1px solid var(--border-light); position: relative; width: 880px; max-width: 95%; }

        .top-btn { position: absolute; top: 25px; background: transparent; padding: 8px 16px; border-radius: 10px; cursor: pointer; transition: var(--transition); font-weight: 700; font-size: 0.8rem; border: 1.5px solid; z-index: 10; }
        #resetTodayBtn { left: 25px; color: var(--btn-reset); border-color: var(--btn-reset); }
        #resetTodayBtn:hover { background: var(--btn-reset); color: white; }
        #freezeBtn { right: 25px; color: var(--btn-freeze); border-color: var(--btn-freeze); }
        #freezeBtn:hover { background: var(--btn-freeze); color: white; }

        .settings-panel { display: flex; flex-direction: column; gap: 0.8rem; border-right: 2px solid var(--bg-input); padding-right: 1.5rem; margin-top: 10px; }
        .panel-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 800; letter-spacing: 1.2px; text-align: center; margin-top: 1rem; }
        .ratio-btn { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-light); padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: 800; }
        .ratio-btn.active { background: var(--color-work); color: white; border-color: var(--color-work); transform: translateY(-2px); }
        .theme-select { background: var(--bg-input); color: var(--text-main); border: 1.5px solid var(--border-light); padding: 12px; border-radius: 12px; cursor: pointer; outline: none; font-size: 0.85rem; font-weight: 600; }

        .timer-content { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .status-badge { font-size: 1rem; text-transform: uppercase; letter-spacing: 5px; font-weight: 900; margin-bottom: 1rem; color: var(--color-work); min-height: 1.2rem; }
        .timer-label { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 0.2rem; font-weight: 600; }
        .total-work-value { font-size: 5.5rem; font-weight: 800; font-family: 'Monaco', monospace; margin: 0; line-height: 1.1; }
        .bank-value { font-size: 4rem; font-weight: 700; font-family: 'Monaco', monospace; color: var(--color-break); margin: 0; line-height: 1.1; }
        .bank-value.negative { color: var(--color-danger); }
        
        .controls { margin-top: 2.5rem; display: flex; gap: 1rem; }
        .action-btn { padding: 20px 50px; font-size: 1.1rem; border-radius: 18px; border: none; cursor: pointer; transition: var(--transition); font-weight: 800; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .work-mode { background: var(--color-work); color: white; }
        .break-mode { background: var(--color-break); color: white; }
        .stats-trigger { background: var(--btn-secondary); color: white; padding: 20px 25px; border-radius: 18px; border: none; cursor: pointer; font-size: 1.2rem; }

        .modal { display: none; position: fixed; inset: 0; background: var(--modal-bg); backdrop-filter: blur(12px); align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-content { background: var(--bg-panel); padding: 2rem; border-radius: 32px; width: 520px; max-height: 85vh; display: flex; flex-direction: column; border: 1px solid var(--border-light); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        
        .stats-list { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-top: 15px; }
        .session-item { background: var(--bg-input); margin-bottom: 8px; padding: 12px 15px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .delete-btn { color: var(--color-danger); background: none; border: none; cursor: pointer; font-size: 1.3rem; padding: 0 5px; opacity: 0.5; transition: 0.2s; }
        .delete-btn:hover { opacity: 1; }

        .chart-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .chart-container { display: flex; align-items: flex-end; justify-content: space-between; height: 120px; padding-bottom: 10px; border-bottom: 2px solid var(--bg-input); }
        .bar-fill { width: 100%; background: var(--btn-freeze); border-radius: 5px 5px 1px 1px; transition: height 0.5s ease; min-height: 2px; }
        .date-divider { font-size: 0.75rem; color: var(--text-muted); font-weight: 800; margin: 15px 0 5px 5px; text-transform: uppercase; border-left: 3px solid var(--color-work); padding-left: 8px; }
    </style>
</head>
<body>

    <div class="main-container">
        <button id="resetTodayBtn" class="top-btn" onclick="resetToday()">SIFIRLA ↺</button>
        <button id="freezeBtn" class="top-btn" onclick="toggleFreeze()">DONDUR ❄️</button>

        <div class="settings-panel">
            <select id="themeSelector" class="theme-select" onchange="changeTheme(this.value)">
                <option value="gece">Gece Teması</option>
                <option value="gunduz">Gündüz Teması</option>
                <option value="kutuphane">Kütüphane</option>
                <option value="cin_tapinagi">Tapınak</option>
            </select>
            <div class="panel-label">MOLA ORANI</div>
            <button class="ratio-btn active" data-ratio="3" onclick="setRatio(3)">1 / 3</button>
            <button class="ratio-btn" data-ratio="4" onclick="setRatio(4)">1 / 4</button>
            <button class="ratio-btn" data-ratio="5" onclick="setRatio(5)">1 / 5</button>
        </div>

        <div class="timer-content">
            <div id="statusBadge" class="status-badge">HAZIR</div>
            <div class="timer-label">BUGÜNKÜ TOPLAM ODAK</div>
            <div id="workDisplay" class="total-work-value">00:00:00</div>
            <div id="blockDisplay" style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem; font-family: monospace;">Blok: 00:00:00</div>
            <div class="timer-label">MOLA BAKİYESİ</div>
            <div id="breakDisplay" class="bank-value">00:00:00</div>
            <div class="controls">
                <button id="mainActionBtn" class="action-btn work-mode" onclick="toggleMain()">ÇALIŞMAYI BAŞLAT</button>
                <button class="stats-trigger" onclick="openStats()">📊</button>
            </div>
        </div>
    </div>

    <div id="statsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0">Haftalık Analiz</h3>
                <button onclick="closeStats()" style="background:none; border:none; color:var(--text-muted); font-size: 1.8rem; cursor:pointer;">&times;</button>
            </div>
            <div id="avgBox" style="background: var(--bg-input); padding: 12px; border-radius: 12px; text-align: center; font-weight: 700; color: var(--color-work); margin-bottom: 15px; font-size: 0.9rem;">
                Haftalık Odak Ortalaması: 00:00:00
            </div>
            <div class="chart-nav">
                <button class="ratio-btn" style="padding: 5px 15px;" onclick="changeWeek(-1)">❮</button>
                <span id="chartRange" style="font-size: 0.85rem; font-weight: 800;">--</span>
                <button class="ratio-btn" id="nextWeekBtn" style="padding: 5px 15px;" onclick="changeWeek(1)">❯</button>
            </div>
            <div id="chartContainer" class="chart-container"></div>
            <button class="ratio-btn" style="width: 100%; margin-top: 20px; border-style: dashed; color: var(--btn-freeze);" onclick="toggleAddForm()">+ Oturum Ekle</button>
            <div id="addForm" style="display: none; background: var(--bg-input); padding: 15px; border-radius: 15px; margin-top: 10px; gap: 8px; grid-template-columns: 1fr 1fr;">
                <input type="date" id="mDate" class="theme-select" style="grid-column: span 2;">
                <input type="time" id="mStart" class="theme-select">
                <input type="time" id="mEnd" class="theme-select">
                <select id="mType" class="theme-select" style="grid-column: span 2;">
                    <option value="WORKING">Çalışma</option>
                    <option value="BREAKING">Mola</option>
                </select>
                <button onclick="addManualSession()" class="ratio-btn active" style="grid-column: span 2;">KAYDET</button>
            </div>
            <div id="statsList" class="stats-list"></div>
        </div>
    </div>

<script>
    let state = {
        breakBank: parseInt(localStorage.getItem('monolith_bank')) || 0,
        history: JSON.parse(localStorage.getItem('monolith_history')) || [],
        ratio: 3, mode: 'IDLE', isFrozen: false, startTime: null, elapsedInBlock: 0, weekOffset: 0, timerInterval: null
    };

    const dom = {
        work: document.getElementById('workDisplay'),
        block: document.getElementById('blockDisplay'),
        bank: document.getElementById('breakDisplay'),
        status: document.getElementById('statusBadge'),
        mainBtn: document.getElementById('mainActionBtn'),
        freezeBtn: document.getElementById('freezeBtn'),
        statsList: document.getElementById('statsList'),
        chart: document.getElementById('chartContainer'),
        range: document.getElementById('chartRange'),
        avg: document.getElementById('avgBox')
    };

    const AudioEngine = {
        ctx: null,
        init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        playWood() {
            this.init(); const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(120, this.ctx.currentTime);
            g.gain.setValueAtTime(0.2, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
            osc.connect(g); g.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.1);
        },
        playAlarm() {
            this.init(); let c = 0;
            const i = setInterval(() => {
                const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
                osc.type = 'triangle'; osc.frequency.value = 350;
                g.gain.setValueAtTime(0.1, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.8);
                osc.connect(g); g.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.8);
                if(++c >= 3) clearInterval(i);
            }, 1000);
        }
    };

    const fmt = (s) => {
        const h = Math.floor(Math.abs(s)/3600), m = Math.floor((Math.abs(s)%3600)/60), sc = Math.abs(s)%60;
        return `${s<0?'-':''}${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`;
    };
    const today = () => new Date().toLocaleDateString('tr-TR');

    function toggleMain() {
        if(state.isFrozen) return;
        AudioEngine.playWood();
        if(state.mode !== 'IDLE') saveSession();
        state.mode = (state.mode === 'WORKING') ? 'BREAKING' : 'WORKING';
        state.startTime = Date.now();
        state.elapsedInBlock = 0;
        dom.mainBtn.innerText = (state.mode === 'WORKING') ? "MOLA VER" : "ÇALIŞMAYA DÖN";
        dom.mainBtn.className = (state.mode === 'WORKING') ? "action-btn break-mode" : "action-btn work-mode";
        if(!state.timerInterval) state.timerInterval = setInterval(tick, 1000);
        updateUI();
    }

    function tick() {
        if(state.isFrozen) return;
        state.elapsedInBlock = Math.floor((Date.now() - state.startTime) / 1000);
        if(state.mode === 'BREAKING' && (state.breakBank - state.elapsedInBlock) === 0) AudioEngine.playAlarm();
        updateUI();
    }

    function updateUI() {
        const pastWork = state.history.filter(i => i.date === today() && i.type === 'WORKING').reduce((a, b) => a + b.dur, 0);
        const curWork = state.mode === 'WORKING' ? state.elapsedInBlock : 0;
        const curBreak = state.mode === 'BREAKING' ? state.elapsedInBlock : 0;
        dom.work.innerText = fmt(pastWork + curWork);
        dom.block.innerText = `Blok: ${fmt(state.elapsedInBlock)}`;
        const currentBank = state.breakBank - curBreak + (state.mode === 'WORKING' ? Math.floor(state.elapsedInBlock/state.ratio) : 0);
        dom.bank.innerText = fmt(currentBank);
        dom.bank.className = currentBank < 0 ? 'bank-value negative' : 'bank-value';
        dom.status.innerText = state.isFrozen ? "SİSTEM DONDURULDU" : (state.mode === 'WORKING' ? "ÇALIŞIYORSUN" : (state.mode === 'BREAKING' ? "MOLADASIN" : "HAZIR"));
        dom.status.style.color = state.mode === 'WORKING' ? 'var(--color-work)' : (state.mode === 'BREAKING' ? 'var(--color-break)' : 'var(--text-muted)');
    }

    function saveSession() {
        if(state.elapsedInBlock < 2) return;
        const sess = { id: Date.now(), date: today(), type: state.mode, dur: state.elapsedInBlock, start: new Date(state.startTime).toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}), end: new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}) };
        if(state.mode === 'WORKING') state.breakBank += Math.floor(state.elapsedInBlock / state.ratio);
        else state.breakBank -= state.elapsedInBlock;
        state.history.push(sess);
        localStorage.setItem('monolith_history', JSON.stringify(state.history));
        localStorage.setItem('monolith_bank', state.breakBank);
    }

    function toggleFreeze() {
        if(state.mode === 'IDLE') return;
        
        if(!state.isFrozen) {
            // DONDUR butonuna basıldığında: Oturumu kaydet ve bloğu sıfırla
            AudioEngine.playWood();
            saveSession();
            state.isFrozen = true;
            state.elapsedInBlock = 0; // Blok süresini görsel olarak sıfırla
            dom.freezeBtn.innerText = "DEVAM ET ▶";
            dom.mainBtn.disabled = true;
            dom.mainBtn.style.opacity = "0.5";
        } else {
            // DEVAM ET butonuna basıldığında: Yeni bir blok başlat
            AudioEngine.playWood();
            state.isFrozen = false;
            state.startTime = Date.now(); // Yeni blok zamanını başlat
            state.elapsedInBlock = 0;
            dom.freezeBtn.innerText = "DONDUR ❄️";
            dom.mainBtn.disabled = false;
            dom.mainBtn.style.opacity = "1";
        }
        updateUI();
    }

    function resetToday() {
        if(confirm("Bugünü sıfırlamak istiyor musun?")) {
            state.history = state.history.filter(i => i.date !== today());
            state.breakBank = 0; state.mode = 'IDLE'; state.elapsedInBlock = 0; state.isFrozen = false;
            clearInterval(state.timerInterval); state.timerInterval = null;
            localStorage.setItem('monolith_history', JSON.stringify(state.history));
            localStorage.setItem('monolith_bank', 0);
            dom.freezeBtn.innerText = "DONDUR ❄️";
            dom.mainBtn.disabled = false; dom.mainBtn.style.opacity = "1";
            updateUI();
            dom.mainBtn.innerText = "ÇALIŞMAYI BAŞLAT"; dom.mainBtn.className = "action-btn work-mode";
        }
    }

    function openStats() { state.weekOffset = 0; renderStats(); document.getElementById('statsModal').style.display = 'flex'; }
    function closeStats() { document.getElementById('statsModal').style.display = 'none'; }
    function toggleAddForm() { const f = document.getElementById('addForm'); f.style.display = f.style.display === 'none' ? 'grid' : 'none'; }

    function changeWeek(dir) { state.weekOffset += dir; renderStats(); }

    function renderStats() {
        dom.statsList.innerHTML = ''; dom.chart.innerHTML = '';
        const base = new Date(); base.setDate(base.getDate() + (state.weekOffset * 7));
        const dayOfWeek = base.getDay();
        const diffToMonday = base.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1);
        const monday = new Date(base.setDate(diffToMonday));
        let totalW = 0, countW = 0, weekDates = [];

        for(let i=0; i<7; i++) {
            const d = new Date(monday); d.setDate(monday.getDate() + i);
            const dStr = d.toLocaleDateString('tr-TR'); weekDates.push(dStr);
            const dayWork = state.history.filter(s => s.date === dStr && s.type === 'WORKING').reduce((a,b)=>a+b.dur, 0);
            if(dayWork > 0) { totalW += dayWork; countW++; }
            const bar = document.createElement('div');
            bar.className = 'bar-wrapper';
            bar.style.cssText = "width:12%; height:100%; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; gap:5px;";
            const h = Math.min((dayWork / 28800) * 100, 100);
            bar.innerHTML = `<div style="font-size:0.6rem; font-weight:bold;">${dayWork>0?Math.floor(dayWork/3600)+'h':''}</div><div class="bar-fill" style="height: ${h}%"></div><div style="font-size:0.65rem; color:var(--text-muted); font-weight:800;">${d.toLocaleDateString('tr-TR', {weekday:'short'})[0]}</div>`;
            dom.chart.appendChild(bar);
            if(i===0) dom.range.innerText = d.toLocaleDateString('tr-TR', {day:'numeric', month:'short'});
            if(i===6) dom.range.innerText += " - " + d.toLocaleDateString('tr-TR', {day:'numeric', month:'short', year:'numeric'});
        }
        dom.avg.innerText = `Haftalık Odak Ortalaması: ${fmt(countW ? Math.floor(totalW/7) : 0)}`;
        document.getElementById('nextWeekBtn').disabled = state.weekOffset >= 0;
        const filteredHistory = state.history.filter(s => weekDates.includes(s.date));
        if(filteredHistory.length === 0) { dom.statsList.innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top:20px;">Bu haftaya ait kayıt bulunamadı.</div>'; } else {
            let lastDate = ""; [...filteredHistory].reverse().forEach(s => {
                if(s.date !== lastDate) { const divDate = document.createElement('div'); divDate.className = 'date-divider'; divDate.innerText = s.date; dom.statsList.appendChild(divDate); lastDate = s.date; }
                const div = document.createElement('div'); div.className = 'session-item';
                div.innerHTML = `<div><div style="font-size:0.75rem; font-weight:800; color:${s.type==='WORKING'?'var(--color-work)':'var(--color-break)'}">${s.type==='WORKING'?'ODAK':'MOLA'}</div><div style="font-size:0.7rem; color:var(--text-muted)">${s.start} - ${s.end}</div></div><div style="display:flex; align-items:center; gap:12px;"><span style="font-family:monospace; font-weight:800;">${fmt(s.dur)}</span><button class="delete-btn" onclick="deleteS(${s.id})">&times;</button></div>`;
                dom.statsList.appendChild(div);
            });
        }
    }

    function deleteS(id) { state.history = state.history.filter(s => s.id !== id); localStorage.setItem('monolith_history', JSON.stringify(state.history)); renderStats(); updateUI(); }

    function addManualSession() {
        const d = document.getElementById('mDate').value, s = document.getElementById('mStart').value, e = document.getElementById('mEnd').value, t = document.getElementById('mType').value;
        if(!d || !s || !e) return;
        const dur = Math.floor((new Date(`${d}T${e}`) - new Date(`${d}T${s}`)) / 1000);
        state.history.push({ id: Date.now(), date: new Date(d).toLocaleDateString('tr-TR'), type: t, dur: dur > 0 ? dur : dur + 86400, start: s, end: e });
        localStorage.setItem('monolith_history', JSON.stringify(state.history));
        renderStats(); updateUI(); toggleAddForm();
    }

    function setRatio(r) { state.ratio = r; document.querySelectorAll('.ratio-btn').forEach(b => b.classList.toggle('active', b.dataset.ratio == r)); AudioEngine.playWood(); }

    function changeTheme(t) { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('monolith_theme', t); }

    window.onload = () => {
        const t = localStorage.getItem('monolith_theme') || 'gece';
        changeTheme(t); document.getElementById('themeSelector').value = t;
        document.getElementById('mDate').valueAsDate = new Date();
        updateUI();
    };
</script>
</body>
</html>
